<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chaudhary Legacy | Familia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2d3436; --accent: #6c5ce7; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; color: var(--primary); }
        
        .header { text-align: center; padding: 60px 20px; background: white; }
        .header h1 { font-weight: 600; font-size: 2.8rem; margin: 0; color: #2d3436; }
        .header p { color: #636e72; font-size: 1.1rem; margin-top: 10px; font-style: italic; }

        .dashboard { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; padding: 50px; max-width: 1200px; margin: auto; 
        }

        .card { 
            background: white; border-radius: 20px; padding: 30px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; 
            text-align: center; border: 1px solid #eee;
        }
        .card:hover { transform: translateY(-5px); }

        /* The Circle Face Styling */
        .circle-container {
            width: 180px; height: 180px; margin: 0 auto 20px;
            border-radius: 50%; overflow: hidden;
            border: 5px solid var(--accent);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.2);
        }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-body h3 { margin: 15px 0; font-weight: 600; font-size: 1.4rem; }
        
        .btn-open { 
            background: var(--accent); color: white; border: none; 
            padding: 12px 30px; border-radius: 50px; cursor: pointer; 
            font-weight: 600; transition: 0.3s;
        }
        .btn-open:hover { background: #5649c0; }

        /* Modal Styling */
        .modal { 
            display: none; position: fixed; z-index: 1000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
        }
        .modal-content { 
            background: white; margin: 5% auto; padding: 40px; 
            width: 90%; max-width: 500px; border-radius: 25px; 
            position: relative; text-align: center;
        }
        .close { position: absolute; right: 25px; top: 15px; font-size: 30px; cursor: pointer; }
        .modal-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 4px solid var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <h1>The Chaudhary Familia</h1>
        <p>Honor, Sacrifice, and Support</p>
    </div>

    <div class="dashboard">
        <div class="card">
            <div class="circle-container">
                <img src="images/Maaji1.jpg" class="card-img" alt="Maa Ji">
            </div>
            <div class="card-body">
                <h3>Maa Ji</h3>
                <button class="btn-open" onclick="openModal('mother')">Read About Me</button>
            </div>
        </div>

        <div class="card">
            <div class="circle-container">
                <img src="images/bhai2.jpg" class="card-img" alt="Daood Bhai">
            </div>
            <div class="card-body">
                <h3>Daood Bhai</h3>
                <button class="btn-open" onclick="openModal('brother')">Read About Me</button>
            </div>
        </div>

        <div class="card">
            <div class="circle-container">
                <img src="images/api3.jpg" class="card-img" alt="Ayesha Api">
            </div>
            <div class="card-body">
                <h3>Ayesha Api</h3>
                <button class="btn-open" onclick="openModal('sister')">Read About Me</button>
            </div>
        </div>

        <div class="card">
            <div class="circle-container">
                <img src="images/uncle4.jpg" class="card-img" alt="Uncle">
            </div>
            <div class="card-body">
                <h3>Uncle (The Legend)</h3>
                <button class="btn-open" onclick="openModal('uncle')">Read About Me</button>
            </div>
        </div>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="" class="modal-img">
            <h2 id="modalTitle" style="color:var(--accent)"></h2>
            <p id="modalDesc" style="line-height:1.6"></p>
        </div>
    </div>

    <script>
        const familyData = {
            mother: { title: "Maa Ji", img: "images/Maaji1.jpg", desc: "Maa Ji has played two roles: mother and father. She struggled her entire life for us. Her resilience is our foundation." },
            brother: { title: "Daood Bhai", img: "images/bhai2.jpg", desc: "A living father figure and an Army Officer who gave me the wings to fly." },
            sister: { title: "Ayesha Api", img: "images/api3.jpg", desc: "A special, cozy member who provided comfort during our most difficult times." },
            uncle: { title: "Uncle (The Legend)", img: "images/uncle4.jpg", desc: "A man who stood by us like a legend when we were just kids. A true pillar of support." }
        };

        function openModal(member) {
            const info = familyData[member];
            document.getElementById('modalTitle').innerText = info.title;
            document.getElementById('modalImg').src = info.img;
            document.getElementById('modalDesc').innerText = info.desc;
            document.getElementById('myModal').style.display = "block";
        }
        function closeModal() { document.getElementById('myModal').style.display = "none"; }
    </script>
</body>
</html>
